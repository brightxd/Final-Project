<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista</title>
    <style>
        body {
            background: #f0f0f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #lista {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            width: 75vw;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            font-family: Arial, sans-serif;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card img {
            width: 80px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .card p {
            margin: 4px 0;
        }

        #btn-atualizar{
            display: block;
            margin-left: auto;
        }
    </style>
</head>

<body>
    <button id="btn-atualizar">Atualizar</button>
    <div id="lista"></div>
    <script>
        async function listarPais() {
            const lista = document.getElementById('lista');

            const carregando = document.createElement('p');
            carregando.textContent = 'Carregando...';

            lista.appendChild(carregando);

            await new Promise(resolve => setTimeout(resolve));

            try {
                const resposta = await fetch("https://restcountries.com/v3.1/all?fields=name,flags,capital,population");
                const dados = await resposta.json();

                dados.slice(0, 10).forEach(pais => {
                    let isDone = true
                    const capital = pais.capital[0]

                    const card = document.createElement('div');
                    card.classList.add('card');

                    const img = document.createElement('img');
                    let random = Math.floor(Math.random() * dados.length) + 1;
                    //console.log("Random: ", random);
                    //console.log("Is Even: ", random % 2 === 0);
                    //if (random % 2 === 0){
                        img.src = pais.flags.png;
                        img.alt = pais.flags.alt;
                        //isDone = false;
                    //}

                    const info = document.createElement('div');

                    let nomePais;
                    let paisNome;
                    if (random % 2 === 0){
                        nomePais = document.createElement('p');
                        nomePais.textContent = `Pais: ${pais.name.common}`;
                    } else {
                        nomePais = document.createElement('input');
                        nomePais.type = "text";
                        nomePais.placeholder = pais.name.common;//"Nome do Pais Aqui";
                        nomePais.style.margin = "0px 10px 0px 0px";

                        paisNome = document.createElement('button');
                        paisNome.textContent = "Tentar";
                        
                        isDone = false;
                        let tentativasRestantes = 3;
                        nomePais.addEventListener('keyup', (event) => {
                            console.log("Event: ", event.key === "Enter");
                            if (!nomePais.value){
                                return alert("Você deve colocar alguma coisa no nome para realizar a tentativa");
                            }
                            if (tentativasRestantes > 0){
                                if (event.key == "Enter"){
                                    if (pais.name.common === nomePais.value){
                                        alert(`Acertou miseravel com ${tentativasRestantes} tentativas restantes`)
                                        nomePais.disabled = true;
                                        paisNome.disabled = true;
                                        card.style.backgroundColor = "rgba(0, 255, 0, 0.5)";
                                    } else {
                                        tentativasRestantes--;
                                    }
                                }
                            } 
                            if (tentativasRestantes === 0) {
                                //nomePais.style.color = "red";
                                //nomePais.style.borderColor = "red";
                                nomePais.disabled = true;
                                paisNome.disabled = true;
                                card.style.backgroundColor = "rgba(255, 0, 0, 0.5)";
                            }
                        });
                        paisNome.addEventListener('click', () => {
                            if (!nomePais.value){
                                return alert("Você deve colocar alguma coisa no nome para realizar a tentativa");
                            }
                            if (tentativasRestantes > 0){
                                if (event.key == "Enter"){
                                    if (pais.name.common === nomePais.value){
                                        alert(`Acertou miseravel com ${tentativasRestantes} tentativas restantes`)
                                        nomePais.disabled = true;
                                        paisNome.disabled = true;
                                        card.style.backgroundColor = "rgba(0, 255, 0, 0.5)";
                                    } else {
                                        tentativasRestantes--;
                                    }
                                }
                            } 
                            if (tentativasRestantes === 0) {
                                //nomePais.style.color = "red";
                                //nomePais.style.borderColor = "red";
                                nomePais.disabled = true;
                                card.style.backgroundColor = "rgba(255, 0, 0, 0.5)";
                            }
                        });
                    }

                    const divNomePais = document.createElement('div');
                    divNomePais.appendChild(nomePais);
                    if (paisNome)
                        divNomePais.appendChild(paisNome);

                    info.appendChild(divNomePais);

                    let capitalPais;
                    let capitalNome;
                    if (!isDone) {
                        capitalPais = document.createElement('p');
                        capitalPais.textContent = `Capital: ${capital}`;
                    } else {
                        capitalPais = document.createElement('input');
                        capitalPais.type = "text";
                        capitalPais.placeholder = capital;//`Capital do Pais Aqui ${capital}`;
                        capitalPais.style.margin = "0px 10px 0px 0px";

                        capitalNome = document.createElement('button');
                        capitalNome.textContent = "Tentar";
                        isDone = false;
                        let tentativasRestantes = 3;
                        //
                        capitalPais.addEventListener('keyup', (event) => {
                            console.log("Event: ", event.key === "Enter");
                            if (!capitalPais.value){
                                return alert("Você deve colocar alguma coisa na capital para realizar a tentativa");
                            }
                            if (tentativasRestantes > 0){
                                if (event.key == "Enter"){
                                    if (capital === capitalPais.value){
                                        //alert(`Acertou miseravel com ${tentativasRestantes} tentativas restantes`)
                                        capitalPais.disabled = true;
                                        capitalNome.disabled = true;
                                        card.style.backgroundColor = "rgba(0, 255, 0, 0.5)";
                                    } else {
                                        tentativasRestantes--;
                                    }
                                }
                            } 
                            if (tentativasRestantes === 0) {
                                //capitalPais.style.color = "red";
                                //capitalPais.style.borderColor = "red";
                                capitalPais.disabled = true;
                                capitalNome.disabled = true;
                                card.style.backgroundColor = "rgba(255, 0, 0, 0.5)";
                            }
                        });
                        capitalNome.addEventListener('click', () => {
                            if (!capitalPais.value){
                                return alert("Você deve colocar alguma coisa no nome para realizar a tentativa");
                            }
                            if (tentativasRestantes > 0){
                                if (event.key == "Enter"){
                                    if (capital === capitalPais.value){
                                        //alert(`Acertou miseravel com ${tentativasRestantes} tentativas restantes`)
                                        capitalPais.disabled = true;
                                        capitalNome.disabled = true;
                                        card.style.backgroundColor = "rgba(0, 255, 0, 0.5)";
                                    } else {
                                        tentativasRestantes--;
                                    }
                                }
                            } 
                            if (tentativasRestantes === 0) {
                                capitalPais.style.color = "red";
                                capitalPais.style.borderColor = "red";
                                capitalPais.disabled = true;
                            }
                        });
                        //
                    }
                    const divCapitalPais = document.createElement('div');
                    divCapitalPais.appendChild(capitalPais);
                    if (capitalNome)
                        divCapitalPais.appendChild(capitalNome);

                    info.appendChild(divCapitalPais);

                    let populacaoPais;
                    let paisPopulacao;
                    if (!isDone){
                        populacaoPais = document.createElement('p');
                        populacaoPais.textContent = `Populacao: ${pais.population.toLocaleString('pt-BR')}`;
                    } else {
                        paisPopulacao = document.createElement('input');
                        paisPopulacao.type = "number";
                        paisPopulacao.placeholder = pais.population.toLocaleString('pt-BR');
                        isDone = false;
                    }
                    info.appendChild(populacaoPais);

                    card.appendChild(img);
                    card.appendChild(info);

                    lista.appendChild(card);
                });

            } catch (err) {
                lista.textContent = 'Erro ao carregar a lista 😢';
                console.error(err);
            } finally {
                carregando.remove();
            }
        }

        function botaoAtualizar() {
            const btn = document.getElementById('btn-atualizar');
            btn.addEventListener('click', listarPais);
        }

        listarPais();
        botaoAtualizar();

    
    </script>
</body>

</html>
