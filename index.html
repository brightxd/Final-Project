<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo de Adivinhação de Países</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="root"></div>

  <script>
    const MAX_TENTATIVAS = 3;

    let carregando = false;

    function criarCampoAdivinhacao(rotulo, resposta, aoFinalizar) {
      let tentativas = 0;
      let concluido = false;

      const wrapper = document.createElement('div');
      wrapper.className = 'campo';

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = `${rotulo}...`;

      const botao = document.createElement('button');
      botao.textContent = 'Tentar';

      const spanTentativas = document.createElement('span');
      spanTentativas.className = 'tentativas';
      spanTentativas.textContent = `0/${MAX_TENTATIVAS}`;

      const spanAviso = document.createElement('span');
      spanAviso.className = 'aviso';

      function verificar() {
        if (!input.value.trim()) {
          spanAviso.textContent = 'Preencha o campo antes de tentar.';
          return;
        }
        spanAviso.textContent = '';
        if (concluido) return;

        tentativas++;
        spanTentativas.textContent = `${tentativas}/${MAX_TENTATIVAS}`;

        if (input.value.trim().toLowerCase() === resposta.toLowerCase()) {
          concluido = true;
          wrapper.innerHTML = '';
          const span = document.createElement('span');
          span.className = 'resultado acerto';
          span.textContent = `${rotulo}: ${resposta} ✓`;
          wrapper.appendChild(span);
          aoFinalizar('acerto');
        } else if (tentativas >= MAX_TENTATIVAS) {
          concluido = true;
          wrapper.innerHTML = '';
          const span = document.createElement('span');
          span.className = 'resultado erro';
          span.textContent = `${rotulo}: ${resposta}`;
          wrapper.appendChild(span);
          aoFinalizar('erro');
        }
      }

      botao.addEventListener('click', verificar);
      input.addEventListener('keyup', e => { if (e.key === 'Enter') verificar(); });
      input.addEventListener('input', () => { spanAviso.textContent = ''; });

      wrapper.appendChild(input);
      wrapper.appendChild(botao);
      wrapper.appendChild(spanTentativas);
      wrapper.appendChild(spanAviso);

      setTimeout(() => input.focus(), 0);

      return wrapper;
    }

    function criarCartaoPais({ pais, adivinharNome, adivinharCapital }) {
      const capital = pais.capital[0];

      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src = pais.flags.png;
      img.alt = pais.flags.alt || pais.name.common;

      const info = document.createElement('div');
      info.className = 'card-info';

      function aoFinalizar(resultado) {
        card.className = `card ${resultado}`;
      }

      if (adivinharNome) {
        info.appendChild(criarCampoAdivinhacao('País', pais.name.common, aoFinalizar));
      } else {
        const span = document.createElement('span');
        span.textContent = `País: ${pais.name.common}`;
        info.appendChild(span);
      }

      if (adivinharCapital) {
        info.appendChild(criarCampoAdivinhacao('Capital', capital, aoFinalizar));
      } else {
        const span = document.createElement('span');
        span.textContent = `Capital: ${capital}`;
        info.appendChild(span);
      }

      const spanPop = document.createElement('span');
      spanPop.textContent = `População: ${pais.population.toLocaleString('pt-BR')}`;
      info.appendChild(spanPop);

      card.appendChild(img);
      card.appendChild(info);

      return card;
    }

    function renderizar(lista, erro) {
      const root = document.getElementById('root');
      root.innerHTML = '';

      const container = document.createElement('div');
      container.className = 'container';

      const cabecalho = document.createElement('div');
      cabecalho.className = 'cabecalho';

      const h1 = document.createElement('h1');
      h1.textContent = '🌍 Adivinhe o País';

      const botaoNovo = document.createElement('button');
      botaoNovo.textContent = carregando ? 'Carregando...' : 'Novo Jogo (N)';
      botaoNovo.disabled = carregando;
      botaoNovo.addEventListener('click', carregarPaises);

      cabecalho.appendChild(h1);
      cabecalho.appendChild(botaoNovo);
      container.appendChild(cabecalho);

      if (erro) {
        const p = document.createElement('p');
        p.className = 'mensagem mensagem-erro';
        p.textContent = erro;
        container.appendChild(p);
      }

      if (carregando) {
        const p = document.createElement('p');
        p.className = 'mensagem';
        p.textContent = 'Carregando países...';
        container.appendChild(p);
      }

      const listaEl = document.createElement('div');
      listaEl.className = 'lista';

      for (const item of lista) {
        listaEl.appendChild(criarCartaoPais(item));
      }

      container.appendChild(listaEl);
      root.appendChild(container);
    }

    async function carregarPaises() {
      carregando = true;
      renderizar([], '');

      try {
        const resposta = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,capital,population');
        const dados = await resposta.json();

        const comCapital = dados.filter(p => p.capital && p.capital.length > 0);
        const embaralhados = comCapital.sort(() => Math.random() - 0.5).slice(0, 10);

        const lista = embaralhados.map(pais => {
          const numero = Math.floor(Math.random() * 100);
          return {
            pais,
            adivinharNome: numero % 2 !== 0,
            adivinharCapital: numero % 2 === 0,
          };
        });

        carregando = false;
        renderizar(lista, '');
      } catch {
        carregando = false;
        renderizar([], 'Erro ao carregar os países. Verifique sua conexão e tente novamente.');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'n' && !carregando && e.target.tagName !== 'INPUT') {
        carregarPaises();
      }
    });

    carregarPaises();
  </script>
</body>

</html>
