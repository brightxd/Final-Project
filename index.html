<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo de Adivinhação de Países</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MAX_TENTATIVAS = 3;

    function CampoAdivinhacao({ rotulo, resposta, cartaoRef }) {
      const [valor, setValor] = useState('');
      const [tentativas, setTentativas] = useState(0);
      const [concluido, setConcluido] = useState(false);

      const acertou = concluido && tentativas <= MAX_TENTATIVAS && valor.trim().toLowerCase() === resposta.toLowerCase();
      const errou = tentativas >= MAX_TENTATIVAS && !acertou;

      function verificar() {
        if (!valor.trim()) {
          alert(`Preencha o campo ${rotulo} antes de tentar.`);
          return;
        }
        if (concluido) return;

        const novasTentativas = tentativas + 1;
        setTentativas(novasTentativas);

        if (valor.trim().toLowerCase() === resposta.toLowerCase()) {
          setConcluido(true);
          cartaoRef.current = 'acerto';
        } else if (novasTentativas >= MAX_TENTATIVAS) {
          setConcluido(true);
          cartaoRef.current = 'erro';
        }
      }

      function aoApertarTecla(evento) {
        if (evento.key === 'Enter') verificar();
      }

      if (errou) {
        return (
          <div className="campo">
            <span className="resultado erro">{rotulo}: {resposta}</span>
          </div>
        );
      }

      if (acertou) {
        return (
          <div className="campo">
            <span className="resultado acerto">{rotulo}: {resposta} ✓</span>
          </div>
        );
      }

      return (
        <div className="campo">
          <input
            type="text"
            placeholder={`${rotulo}...`}
            value={valor}
            onChange={e => setValor(e.target.value)}
            onKeyUp={aoApertarTecla}
            disabled={concluido}
          />
          <button onClick={verificar} disabled={concluido}>Tentar</button>
          <span className="tentativas">{tentativas}/{MAX_TENTATIVAS}</span>
        </div>
      );
    }

    function CartaoPais({ pais, adivinharNome, adivinharCapital }) {
      const [estadoCartao, setEstadoCartao] = useState('');
      const cartaoRef = useRef('');

      useEffect(() => {
        const intervalo = setInterval(() => {
          if (cartaoRef.current !== estadoCartao) {
            setEstadoCartao(cartaoRef.current);
          }
        }, 200);
        return () => clearInterval(intervalo);
      }, [estadoCartao]);

      const capital = pais.capital[0];

      return (
        <div className={`card ${estadoCartao}`}>
          <img src={pais.flags.png} alt={pais.flags.alt || pais.name.common} />
          <div className="card-info">
            {adivinharNome
              ? <CampoAdivinhacao rotulo="País" resposta={pais.name.common} cartaoRef={cartaoRef} />
              : <span>País: {pais.name.common}</span>
            }
            {adivinharCapital
              ? <CampoAdivinhacao rotulo="Capital" resposta={capital} cartaoRef={cartaoRef} />
              : <span>Capital: {capital}</span>
            }
            <span>População: {pais.population.toLocaleString('pt-BR')}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [paises, setPaises] = useState([]);
      const [carregando, setCarregando] = useState(false);
      const [erro, setErro] = useState('');

      async function carregarPaises() {
        setCarregando(true);
        setErro('');
        setPaises([]);

        try {
          const resposta = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,capital,population');
          const dados = await resposta.json();

          const comCapital = dados.filter(p => p.capital && p.capital.length > 0);
          const embaralhados = comCapital.sort(() => Math.random() - 0.5).slice(0, 10);

          const lista = embaralhados.map(pais => {
            const numero = Math.floor(Math.random() * 100);
            return {
              pais,
              adivinharNome: numero % 2 !== 0,
              adivinharCapital: numero % 2 === 0,
            };
          });

          setPaises(lista);
        } catch {
          setErro('Erro ao carregar os países. Verifique sua conexão e tente novamente.');
        } finally {
          setCarregando(false);
        }
      }

      useEffect(() => { carregarPaises(); }, []);

      return (
        <div className="container">
          <div className="cabecalho">
            <h1>🌍 Adivinhe o País</h1>
            <button onClick={carregarPaises} disabled={carregando}>
              {carregando ? 'Carregando...' : 'Novo Jogo'}
            </button>
          </div>

          {erro && <p className="mensagem mensagem-erro">{erro}</p>}
          {carregando && <p className="mensagem">Carregando países...</p>}

          <div className="lista">
            {paises.map(({ pais, adivinharNome, adivinharCapital }) => (
              <CartaoPais
                key={pais.name.common}
                pais={pais}
                adivinharNome={adivinharNome}
                adivinharCapital={adivinharCapital}
              />
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
